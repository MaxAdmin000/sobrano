<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>СОБРАНО · Печать заказа</title>
<meta name="robots" content="noindex,nofollow" />
<style>
:root{ --ink:#1A1410; --mute:#7A6B5E; --line:#1a141022; }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',Helvetica,Arial,sans-serif;color:var(--ink);background:#fff;padding:24px;line-height:1.5;-webkit-font-smoothing:antialiased}
.toolbar{display:flex;gap:8px;margin-bottom:18px;align-items:center;padding-bottom:14px;border-bottom:1px solid var(--line)}
.toolbar button{padding:8px 14px;border:1px solid var(--line);border-radius:6px;background:#fff;font-size:13px;cursor:pointer}
.toolbar button:hover{background:#f7f1e8}
.toolbar .title{margin-left:auto;font-family:Georgia,serif;font-size:18px;color:var(--mute)}

.receipt{max-width:720px;margin:auto;padding:24px;border:1px solid var(--line);border-radius:8px}
.receipt h1{font-family:Georgia,serif;font-weight:400;font-size:24px;letter-spacing:-.01em;margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline;gap:16px}
.receipt h1 .id{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--mute);font-weight:500;letter-spacing:.04em}
.brand{font-family:Georgia,serif;font-style:italic;color:#5C1F25;margin-bottom:18px;font-size:14px;letter-spacing:.04em}

.section{margin:18px 0;padding-top:14px;border-top:1px dashed var(--line)}
.section h2{font-family:Georgia,serif;font-size:15px;font-weight:600;color:var(--mute);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.kv{display:grid;grid-template-columns:130px 1fr;gap:6px 14px;font-size:13.5px}
.kv .l{color:var(--mute)}
.kv .v{color:var(--ink)}
.items{display:flex;flex-direction:column;gap:6px;font-size:14px}
.items .it{display:flex;justify-content:space-between;padding:6px 0}
.items .it .n{flex:1}
.items .it .q{color:var(--mute);font-family:'JetBrains Mono',monospace;font-size:12px;padding:0 12px}
.items .it .pr{min-width:90px;text-align:right;font-family:Georgia,serif}
.totals{margin-top:8px;border-top:1px solid var(--ink);padding-top:8px;font-size:14px}
.totals .tr{display:flex;justify-content:space-between;padding:4px 0}
.totals .tr.big{font-size:20px;font-family:Georgia,serif;font-weight:600;border-top:1px solid var(--ink);margin-top:6px;padding-top:8px}

.footer{margin-top:24px;padding-top:14px;border-top:1px dashed var(--line);font-size:12px;color:var(--mute);text-align:center;line-height:1.6}
.footer strong{color:var(--ink)}

.label-box{padding:14px;border:1px dashed var(--ink);border-radius:6px;margin-top:14px}
.label-box h3{font-family:Georgia,serif;font-size:13px;color:var(--mute);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.label-box .recipient{font-size:18px;font-family:Georgia,serif;margin-bottom:4px}
.label-box .addr{font-size:14px;line-height:1.4}
.label-box .when{margin-top:6px;font-size:13px;color:var(--mute);font-family:'JetBrains Mono',monospace}

.compose{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.compose span{font-family:'JetBrains Mono',monospace;font-size:11px;background:#f7f1e8;padding:3px 8px;border-radius:999px}

@media print{
  .toolbar{display:none}
  body{padding:0}
  .receipt{border:0;padding:0;max-width:none}
}
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="window.print()">⎙ Распечатать</button>
  <button onclick="window.close()">Закрыть</button>
  <span class="title">Печать заказа</span>
</div>

<div class="receipt" id="receipt">
  <div style="text-align:center;padding:60px 0;color:var(--mute);font-family:Georgia,serif;font-style:italic">Загружаем заказ…</div>
</div>

<script>
(async function(){
  const params = new URLSearchParams(location.search);
  const id = params.get("id");
  if (!id) {
    document.getElementById("receipt").innerHTML = '<div style="text-align:center;padding:60px 0;color:#5C1F25">Не указан id заказа</div>';
    return;
  }
  // Auth via localStorage token
  const t = localStorage.getItem("sob_admin_token") || "";
  const headers = t ? { authorization: "Bearer " + t } : {};
  let order = null, settings = null;
  try {
    const r1 = await fetch("/api/admin/orders/" + encodeURIComponent(id), { headers, credentials: "same-origin" });
    const d1 = await r1.json();
    if (!d1.ok) throw new Error(d1.error || "Заказ не найден");
    order = d1.order;
    const r2 = await fetch("/api/settings");
    settings = (await r2.json()).settings || {};
  } catch (err) {
    document.getElementById("receipt").innerHTML = '<div style="text-align:center;padding:60px 0;color:#5C1F25">Ошибка: '+escapeHtml(err.message||"")+'</div>';
    return;
  }
  render(order, settings);

  // Автопечать, если ?print=1
  if (params.get("print") === "1") setTimeout(() => window.print(), 300);
})();

function escapeHtml(s){ return String(s == null ? "" : s).replace(/[&<>"']/g, ch => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;" }[ch])); }
function fmt(n){ return Number(n||0).toLocaleString("ru-RU") + " ₽"; }
function fmtDt(ms){ const d = new Date(ms); return d.toLocaleString("ru-RU"); }
const STATUS_LABEL = { new:"Новый", paid:"Оплачен", doing:"В сборке", shipped:"Отправлен", done:"Выдан", cancelled:"Отменён" };

function render(o, settings){
  const cust = o.customer || {};
  const req = settings.requisites || {};
  const contacts = settings.contacts || {};
  let html = '';

  html += '<div class="brand">СОБРАНО · цветочные боксы</div>';
  html += '<h1>Заказ <span class="id">' + escapeHtml(o.id) + '</span></h1>';
  html += '<div style="font-size:12px;color:var(--mute);font-family:\'JetBrains Mono\',monospace;letter-spacing:.04em">Создан: ' + fmtDt(o.createdAt) + ' · Статус: ' + (STATUS_LABEL[o.status] || o.status) + '</div>';

  // Получатель / адрес — крупно для курьерской наклейки
  html += '<div class="label-box">' +
    '<h3>Доставка</h3>' +
    '<div class="recipient">' + escapeHtml(cust.recip || cust.name || "—") + '</div>' +
    (cust.phone ? '<div class="addr">' + escapeHtml(cust.phone) + '</div>' : '') +
    '<div class="addr">' + escapeHtml([cust.addr, cust.apt].filter(Boolean).join(", ") || "адрес не указан") + '</div>' +
    (cust.date || cust.time ? '<div class="when">' + escapeHtml([cust.date, cust.time].filter(Boolean).join(" · ")) + '</div>' : '') +
    (o.delivery === "yandex" ? '<div class="when">канал: Яндекс Go</div>' : '<div class="when">канал: свой курьер</div>') +
    (o.trackNo ? '<div class="when">трек: ' + escapeHtml(o.trackNo) + '</div>' : '') +
    (o.courier ? '<div class="when">курьер: ' + escapeHtml(o.courier) + '</div>' : '') +
  '</div>';

  // Состав
  html += '<div class="section"><h2>Состав</h2><div class="items">';
  if (o.box) {
    html += '<div class="it"><span class="n">Бокс ' + escapeHtml(o.box.size||"?") + ' · ' + (o.box.capacity||0) + ' стеблей</span><span class="pr">' + fmt(o.box.price||0) + '</span></div>';
    const flowers = o.box.flowers || {};
    const compChips = Object.entries(flowers).filter(([,q])=>q>0).map(([fid,q]) => '<span>×' + q + ' ' + escapeHtml(fid) + '</span>').join('');
    if (compChips) html += '<div class="compose">' + compChips + '</div>';
  }
  if (o.addons && o.addons.length) {
    o.addons.forEach(a => {
      html += '<div class="it"><span class="n">' + escapeHtml(a.title||a.id) + '</span><span class="q">× ' + (a.qty||1) + '</span><span class="pr">' + fmt((a.price||0)*(a.qty||1)) + '</span></div>';
    });
  }
  html += '</div></div>';

  // Суммы
  html += '<div class="section"><h2>Суммы</h2><div class="totals">' +
    '<div class="tr"><span>Подытог</span><span>' + fmt(o.subtotal||0) + '</span></div>' +
    '<div class="tr"><span>Доставка</span><span>' + (o.deliveryPrice ? fmt(o.deliveryPrice) : "по тарифу") + '</span></div>' +
    (o.discount ? '<div class="tr"><span>Промокод ' + escapeHtml(o.promo||"") + '</span><span>− ' + fmt(o.discount) + '</span></div>' : '') +
    '<div class="tr big"><span>Итого</span><span>' + fmt(o.total||0) + '</span></div>' +
  '</div></div>';

  // Клиент (полностью)
  const clRows = [];
  function r(l, v){ if (v) clRows.push('<div class="l">'+escapeHtml(l)+'</div><div class="v">'+escapeHtml(v)+'</div>'); }
  r("ФИО", cust.name);
  r("Телефон", cust.phone);
  r("Email", cust.email);
  r("Получатель", cust.recip);
  r("Канал связи", ({phone:"Звонок",email:"Email",telegram:"Telegram",whatsapp:"WhatsApp"})[cust.channel] || cust.channel);
  r("Способ оплаты", ({card:"Карта (Robokassa)",sbp:"СБП"})[cust.payment] || cust.payment);
  if (cust.note) r("Комментарий клиента", cust.note);
  if (o.note) r("Заметка флориста", o.note);

  html += '<div class="section"><h2>Клиент</h2><div class="kv">' + clRows.join("") + '</div></div>';

  // Реквизиты ИП
  if (req.legalName) {
    html += '<div class="footer">';
    html += '<strong>' + escapeHtml(req.legalName) + '</strong>';
    if (req.inn) html += ' · ИНН ' + escapeHtml(req.inn);
    if (req.ogrnip) html += ' · ОГРНИП ' + escapeHtml(req.ogrnip);
    html += '<br>' + escapeHtml(req.address || "");
    if (contacts.email) html += ' · ' + escapeHtml(contacts.email);
    if (contacts.phone) html += ' · ' + escapeHtml(contacts.phone);
    html += '</div>';
  }

  document.getElementById("receipt").innerHTML = html;
  document.title = "СОБРАНО · " + o.id;
}
</script>
</body>
</html>
